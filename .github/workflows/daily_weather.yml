name: Daily Weather Email

on:
  schedule:
    # Runs at 7:00 AM PKT (2:00 AM UTC) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather script
        env:
          # This connects your secrets to the Python script
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          WEATHER_CITY: "Islamabad"
        run: python weather_email.py
